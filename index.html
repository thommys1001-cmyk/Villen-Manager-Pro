<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Villen Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000 !important; color: #D4AF37; font-family: sans-serif; margin: 0; padding: 20px; }
        
        /* DER FORCE-FIX FÜR DAS LOGO */
        .final-logo-shield {
            width: 150px; 
            height: 150px; 
            border-radius: 50%; 
            border: 4px solid #D4AF37; 
            margin: 0 auto 30px;
            /* Wir laden das Bild als Hintergrund und zoomen es massiv auf 260% */
            background-image: url('https://static.wixstatic.com/media/cf12a4_309b19e9cae5446f88289a3f2d2b512c~mv2.jpg');
            background-position: center;
            background-size: 260%; 
            background-repeat: no-repeat;
            background-color: #000;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
        }

        .main-card {
            background: #080808;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 24px;
            padding: 30px;
            max-width: 480px;
            margin: auto;
        }

        select, input {
            width: 100%;
            background: #151515;
            border: 1px solid #333;
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .btn-gold {
            background: linear-gradient(180deg, #F1D279 0%, #B8962E 100%);
            color: #000;
            font-weight: bold;
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            border: none;
            text-transform: uppercase;
            font-size: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="final-logo-shield"></div>

    <h1 style="text-align: center; color: #F1D279; letter-spacing: 2px; margin-bottom: 30px; font-weight: 800;">CHECK-IN PRO</h1>

    <div class="main-card">
        <label style="display:block; text-align:left; font-size:11px; margin-bottom:8px; color:#888;">KATEGORIE</label>
        <select id="kat">
            <option value="Villa">Villa</option>
            <option value="Apartment">Apartment</option>
            <option value="Ferienhaus">Ferienhaus</option>
            <option value="Zimmer">Einzelzimmer</option>
        </select>

        <label style="display:block; text-align:left; font-size:11px; margin-bottom:8px; color:#888;">OBJEKT NAME</label>
        <input type="text" id="objekt" placeholder="z.B. Villa Sol">

        <button onclick="start()" class="btn-gold">Scanner aktivieren</button>
        
        <video id="webcam" autoplay playsinline style="width:100%; border-radius:15px; margin-top:20px; border:1px solid #D4AF37; display:none;"></video>
    </div>

    <script>
        async function start() {
            const v = document.getElementById('webcam');
            v.style.display = "block";
            try {
                const s = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { ideal: "environment" } } 
                });
                v.srcObject = s;
            } catch (e) { alert("Kamera-Zugriff prüfen!"); }
        }
    </script>
</body>
</html>
