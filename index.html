<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Villen Manager Pro - Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #D4AF37; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .scan-container { border: 2px solid #D4AF37; border-radius: 20px; overflow: hidden; background: #111; position: relative; margin-bottom: 20px; }
        video { width: 100%; height: auto; display: block; }
        .gold-button { background: linear-gradient(180deg, #F1D279 0%, #B8962E 100%); color: #000; font-weight: bold; padding: 15px; border-radius: 12px; width: 100%; border: none; text-transform: uppercase; font-size: 16px; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
    </style>
</head>
<body>

    <h1 style="color: #F1D279; font-size: 24px; margin-bottom: 20px;">Ausweis Scanner</h1>

    <div class="scan-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <button onclick="startBackCamera()" class="gold-button">Rückkamera aktivieren</button>

    <p id="error-log" style="color: red; font-size: 12px; margin-top: 10px;"></p>

    <script>
        async function startBackCamera() {
            const video = document.getElementById('video');
            const errorLog = document.getElementById('error-log');

            // Falls schon ein Stream läuft, stoppen wir ihn zuerst
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: {
                    // "facingMode: exact environment" zwingt das Handy zur Rückkamera
                    facingMode: { exact: "environment" }
                }
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                errorLog.innerText = ""; // Fehler löschen, wenn es klappt
            } catch (err) {
                console.error("Fehler mit exact:", err);
                // Zweiter Versuch: Falls "exact" nicht geht, versuchen wir es weniger streng
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "environment" } 
                    });
                    video.srcObject = stream;
                } catch (err2) {
                    errorLog.innerText = "Fehler: Bitte Kamera-Zugriff in den Handy-Einstellungen erlauben!";
                }
            }
        }

        // Startet die Kamera automatisch beim Laden der Seite (Versuch)
        window.onload = startBackCamera;
    </script>
</body>
</html>
