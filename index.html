<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Villen Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; margin: 0; padding: 20px; color: #D4AF37; font-family: sans-serif; text-align: center; }
        
        /* DER ULTIMATIVE LOGO-FIX */
        .logo-wrapper {
            width: 140px;
            height: 140px;
            margin: 0 auto 30px;
            border-radius: 50%;
            border: 3px solid #D4AF37;
            overflow: hidden; /* Das schneidet alles draußen ab */
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Füllt den Kreis komplett aus */
            transform: scale(2.0); /* SEHR STARKER ZOOM - schneidet den Rand sicher weg */
        }

        .container { border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 20px; background: #050505; padding: 30px; max-width: 450px; margin: auto; }
        video { width: 100%; border-radius: 15px; border: 1px solid #D4AF37; margin-bottom: 20px; }
        .btn { background: linear-gradient(180deg, #F1D279 0%, #B8962E 100%); color: #000; font-weight: bold; width: 100%; padding: 18px; border-radius: 12px; border: none; text-transform: uppercase; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <div class="logo-wrapper">
        <img src="https://static.wixstatic.com/media/cf12a4_309b19e9cae5446f88289a3f2d2b512c~mv2.jpg" alt="Logo">
    </div>

    <h1 style="color: #F1D279; font-size: 24px; margin-bottom: 30px; font-weight: bold;">VILLEN MANAGER PRO</h1>

    <div class="container">
        <video id="v" autoplay playsinline></video>
        <button onclick="start()" class="btn">Ausweis scannen</button>
    </div>

    <script>
        async function start() {
            const video = document.getElementById('v');
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = s;
            } catch (e) { alert("Kamera-Fehler"); }
        }
    </script>
</body>
</html>
