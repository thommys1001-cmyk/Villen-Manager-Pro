<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Villen Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000 !important; color: #D4AF37; font-family: sans-serif; margin: 0; padding: 15px; }
        
        /* Der ultimative Logo-Fix für MacBook & Handy */
        .logo-header {
            width: 130px; height: 130px; 
            border-radius: 50%; border: 3px solid #D4AF37; 
            margin: 0 auto 20px; overflow: hidden; background: #000;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-header img {
            width: 100%; height: 100%; object-fit: cover; transform: scale(2.3);
        }

        .card {
            background: #0a0a0a; border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px; padding: 25px; max-width: 480px; margin: auto;
        }

        label {
            display: block; text-align: left; font-size: 11px; 
            color: #D4AF37; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;
        }

        select, input {
            width: 100%; background: #1a1a1a; border: 1px solid #333;
            color: #fff !important; padding: 14px; border-radius: 10px;
            margin-bottom: 20px; font-size: 16px; outline: none;
        }

        .btn-gold {
            background: linear-gradient(180deg, #F1D279 0%, #B8962E 100%);
            color: #000; font-weight: bold; width: 100%; padding: 16px;
            border-radius: 12px; border: none; text-transform: uppercase; cursor: pointer; font-size: 14px;
        }

        video { width: 100%; border-radius: 15px; margin-top: 15px; border: 1px solid #D4AF37; display: none; }
    </style>
</head>
<body>

    <div class="logo-header">
        <img src="https://static.wixstatic.com/media/cf12a4_309b19e9cae5446f88289a3f2d2b512c~mv2.jpg" alt="Logo">
    </div>

    <h1 style="text-align: center; color: #F1D279; margin-bottom: 25px; font-size: 20px; font-weight: bold; letter-spacing: 2px;">CHECK-IN PRO</h1>

    <div class="card">
        <label>1. Kategorie wählen</label>
        <select id="kategorie" onchange="updateObjekte()">
            <option value="">-- Bitte wählen --</option>
            <option value="villen">Villen</option>
            <option value="ferienhaeuser">Ferienhäuser</option>
            <option value="apartments">Apartments</option>
            <option value="zimmer">Zimmer</option>
        </select>

        <label id="objektLabel">2. Objekt auswählen</label>
        <select id="objekt_liste">
            <option value="">Zuerst Kategorie wählen...</option>
        </select>

        <label>3. Gast Name</label>
        <input type="text" id="gast_name" placeholder="Vollständiger Name">

        <button onclick="startApp()" class="btn-gold">Scan Starten</button>
        
        <video id="webcam" autoplay playsinline></video>
    </div>

    <script>
        // HIER KANNST DU UNBEGRENZT NAMEN HINZUFÜGEN
        const datenbank = {
            "villen": ["Villa Sol", "Villa Luna", "Villa Mar", "Villa Paradiso"],
            "ferienhaeuser": ["Finca Rustica", "Haus am See", "Waldhaus"],
            "apartments": ["App. 01 - EG", "App. 02 - OG", "Penthouse"],
            "zimmer": ["Zimmer 101", "Zimmer 102", "Suite Royal"]
        };

        function updateObjekte() {
            const kat = document.getElementById('kategorie').value;
            const objSelect = document.getElementById('objekt_liste');
            
            // Liste leeren
            objSelect.innerHTML = '<option value="">-- Name wählen --</option>';

            if (kat && datenbank[kat]) {
                datenbank[kat].forEach(name => {
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.innerText = name;
                    objSelect.appendChild(opt);
                });
            }
        }

        async function startApp() {
            const v = document.getElementById('webcam');
            const obj = document.getElementById('objekt_liste').value;
            
            if(!obj) {
                alert("Bitte wählen Sie ein Objekt aus!");
                return;
            }

            v.style.display = "block";
            try {
                const s = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { ideal: "environment" } } 
                });
                v.srcObject = s;
            } catch (e) {
                alert("Kamera-Fehler");
            }
        }
    </script>
</body>
</html>
