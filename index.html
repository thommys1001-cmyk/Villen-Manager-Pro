<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Villen Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000 !important; color: #D4AF37; font-family: sans-serif; margin: 0; padding: 15px; }
        
        /* Logo Fix */
        .logo-header {
            width: 130px; height: 130px; 
            border-radius: 50%; border: 3px solid #D4AF37; 
            margin: 0 auto 20px; overflow: hidden; background: #000;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-header img {
            width: 100%; height: 100%; object-fit: cover; transform: scale(2.2);
        }

        .card {
            background: #0a0a0a; border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px; padding: 20px; max-width: 480px; margin: auto;
        }

        label {
            display: block; text-align: left; font-size: 11px; 
            color: #D4AF37; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;
        }

        /* Styling für das Auswahlmenü und Eingabefelder */
        select, input {
            width: 100%; background: #1a1a1a; border: 1px solid #333;
            color: #fff !important; padding: 12px; border-radius: 10px;
            margin-bottom: 20px; font-size: 16px; appearance: none; -webkit-appearance: none;
        }

        /* Damit man den Text im Dropdown auch sieht */
        select option { background: #1a1a1a; color: #fff; }

        .btn-gold {
            background: linear-gradient(180deg, #F1D279 0%, #B8962E 100%);
            color: #000; font-weight: bold; width: 100%; padding: 16px;
            border-radius: 12px; border: none; text-transform: uppercase; cursor: pointer;
        }

        video { width: 100%; border-radius: 15px; margin-top: 15px; border: 1px solid #D4AF37; display: none; }
    </style>
</head>
<body>

    <div class="logo-header">
        <img src="https://static.wixstatic.com/media/cf12a4_309b19e9cae5446f88289a3f2d2b512c~mv2.jpg" alt="Logo">
    </div>

    <h1 style="text-align: center; color: #F1D279; margin-bottom: 25px; font-size: 20px; font-weight: bold;">CHECK-IN MANAGER</h1>

    <div class="card">
        <label>Kategorie wählen</label>
        <select id="kategorie_select">
            <option value="" disabled selected>Bitte wählen...</option>
            <option value="Villa">Villa</option>
            <option value="Ferienhaus">Ferienhaus</option>
            <option value="Apartment">Apartment</option>
            <option value="Zimmer">Zimmer</option>
        </select>

        <label>Objekt Name / Nr.</label>
        <input type="text" id="objekt_name" placeholder="z.B. Villa Deluxe">

        <label>Gast Name</label>
        <input type="text" id="gast_name" placeholder="Vollständiger Name">

        <button onclick="activateScanner()" class="btn-gold">Scan Starten</button>
        
        <video id="video_stream" autoplay playsinline></video>
    </div>

    <script>
        async function activateScanner() {
            const v = document.getElementById('video_stream');
            const kat = document.getElementById('kategorie_select').value;
            
            if(!kat) {
                alert("Bitte wähle zuerst eine Kategorie aus!");
                return;
            }

            v.style.display = "block";
            try {
                const s = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { ideal: "environment" } } 
                });
                v.srcObject = s;
            } catch (e) {
                alert("Kamera-Zugriff wurde verweigert.");
            }
        }
    </script>
</body>
</html>
