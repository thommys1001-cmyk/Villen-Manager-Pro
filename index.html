<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Villen Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000 !important; color: #D4AF37; font-family: sans-serif; margin: 0; padding: 15px; }
        
        /* LOGO FIX GEGEN WEISSEN RAND */
        .logo-shield {
            width: 140px; height: 140px; 
            border-radius: 50%; border: 3px solid #D4AF37; 
            margin: 0 auto 20px; overflow: hidden; background: #000;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-shield img {
            width: 100%; height: 100%; object-fit: cover; transform: scale(2.5);
        }

        .card-main {
            background: #080808; border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px; padding: 25px; max-width: 500px; margin: auto;
        }

        label { display: block; text-align: left; font-size: 10px; color: #D4AF37; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }

        select, input {
            width: 100%; background: #151515; border: 1px solid #333;
            color: #fff !important; padding: 14px; border-radius: 12px;
            margin-bottom: 20px; font-size: 16px; outline: none; appearance: none;
        }

        .btn-gold {
            background: linear-gradient(180deg, #F1D279 0%, #B8962E 100%);
            color: #000; font-weight: bold; width: 100%; padding: 16px;
            border-radius: 14px; border: none; text-transform: uppercase; font-size: 14px; cursor: pointer;
        }

        .description { color: #888; font-size: 13px; margin-bottom: 30px; line-height: 1.5; text-align: center; }
        video { width: 100%; border-radius: 15px; margin-top: 15px; border: 1px solid #D4AF37; display: none; }
    </style>
</head>
<body>

    <div class="logo-shield">
        <img src="https://static.wixstatic.com/media/cf12a4_309b19e9cae5446f88289a3f2d2b512c~mv2.jpg" alt="Logo">
    </div>

    <h1 style="text-align: center; color: #F1D279; font-size: 22px; font-weight: bold; margin-bottom: 5px;">VILLEN MANAGER PRO</h1>
    <p class="description">Professionelle Verwaltung für Hotel, Villen, Apartment & Zimmer</p>

    <div class="card-main">
        <label>1. Kategorie auswählen</label>
        <select id="kategorie_auswahl" onchange="ladeUntermenue()">
            <option value="">-- Bitte wählen --</option>
            <option value="hotel">Hotel</option>
            <option value="villen">Villen</option>
            <option value="ferienhaeuser">Ferienhäuser</option>
            <option value="apartment">Apartment</option>
            <option value="zimmer">Zimmer</option>
        </select>

        <label>2. Name / Objekt auswählen</label>
        <select id="objekt_name">
            <option value="">Zuerst Kategorie wählen...</option>
        </select>

        <label>3. Gast Name</label>
        <input type="text" id="gast_name" placeholder="Name eintragen">

        <button onclick="startCheckIn()" class="btn-gold">Check-In / Scanner Starten</button>
        
        <video id="scanner_video" autoplay playsinline></video>
    </div>

    <script>
        // HIER KANNST DU DEINE DATEN UNBEGRENZT EINTRAGEN
        const meineDaten = {
            "hotel": ["Grand Hotel", "Beach Resort", "City Hotel"],
            "villen": ["Villa Mali Svor", "Villa Panorama", "Villa Royal"],
            "ferienhaeuser": ["Haus am Meer", "Landhaus Bergview"],
            "apartment": ["App. Blue 01", "Penthouse A", "Studio 105"],
            "zimmer": ["Zimmer 101", "Zimmer 102", "Suite 200"]
        };

        function ladeUntermenue() {
            const kat = document.getElementById('kategorie_auswahl').value;
            const sub = document.getElementById('objekt_name');
            
            // Untermenü leeren
            sub.innerHTML = '<option value="">-- Name wählen --</option>';
            
            if(kat && meineDaten[kat]) {
                meineDaten[kat].forEach(name => {
                    let option = document.createElement('option');
                    option.value = name;
                    option.textContent = name;
                    sub.appendChild(option);
                });
            }
        }

        async function startCheckIn() {
            const v = document.getElementById('scanner_video');
            const auswahl = document.getElementById('objekt_name').value;
            
            if(!auswahl) {
                alert("Bitte wählen Sie ein Objekt aus der Liste aus!");
                return;
            }

            v.style.display = "block";
            try {
                const s = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                v.srcObject = s;
            } catch (e) {
                alert("Kamera konnte nicht gestartet werden.");
            }
        }
    </script>
</body>
</html>
